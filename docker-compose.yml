# docker-compose.yml
# Local infrastructure stack: MS SQL Server 2025 · PostgreSQL · Azure Service Bus Emulator Proxy
#
# The Service Bus Emulator Proxy transparently shards topics/queues across
# multiple emulator instances (50 entities each), presenting a single AMQP
# and management endpoint to applications.
#
# Prerequisites:
#   - Docker (license-free runtime: Docker Engine on Linux, Rancher Desktop, or Podman)
#   - Copy .env.example to .env and replace placeholder values before starting
#
# Quick start:
#   cp .env.example .env        # then edit .env with your secrets
#   cp servicebus/Config.example.json servicebus/Config.json
#   docker compose up -d        # start all services
#   docker compose down         # stop all services
#   docker compose down -v      # stop and remove persistent volumes

services:

  # ── MS SQL Server 2025 (Developer Edition — free for dev/test) ──────────────
  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: local-mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -b -Q "SELECT 1" -o /dev/null || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Azure Service Bus Emulator Proxy ────────────────────────────────────────
  # The proxy reads a large Config.json, shards entities across multiple
  # emulator instances (created dynamically via the Docker API), and exposes
  # a single AMQP + HTTP management endpoint.
  servicebus-proxy:
    build: ./servicebus/proxy
    container_name: local-servicebus-proxy
    restart: unless-stopped
    environment:
      PROXY_CONFIG_PATH: /config/Config.json
      PROXY_STATE_PATH: /state/proxy-state.json
      EMULATOR_CONFIG_DIR: /emulator-configs
      PROXY_AMQP_PORT: "5672"
      PROXY_MGMT_PORT: "5300"
      SERVICEBUS_SQL_PASSWORD: "${SERVICEBUS_SQL_PASSWORD}"
      DOCKER_NETWORK: "local-infrastructure_default"
    ports:
      - "${SERVICEBUS_PORT:-5672}:5672"
      - "${SERVICEBUS_MGMT_PORT:-5300}:5300"
      - "${SERVICEBUS_ADMIN_PORT:-443}:443"
    volumes:
      - ./servicebus/Config.json:/config/Config.json:ro
      - ./servicebus/emulator-configs:/emulator-configs
      - ./servicebus/proxy-cert:/cert:ro
      - servicebus_proxy_state:/state
      - /var/run/docker.sock:/var/run/docker.sock
    # NOTE: Health is verified externally by stack.ps1 via the /health HTTP
    # endpoint on the management port. The proxy aggregates health from all
    # backend emulator instances.

volumes:
  mssql_data:
  postgres_data:
  servicebus_proxy_state:
