# docker-compose.yml
# Local infrastructure stack: MS SQL Server 2025 · PostgreSQL · Azure Service Bus Emulator
#
# Prerequisites:
#   - Docker (license-free runtime: Docker Engine on Linux, Rancher Desktop, or Podman)
#   - Copy .env.example to .env and replace placeholder values before starting
#
# Quick start:
#   cp .env.example .env        # then edit .env with your secrets
#   docker compose up -d        # start all services
#   docker compose down         # stop all services
#   docker compose down -v      # stop and remove persistent volumes

services:

  # ── MS SQL Server 2025 (Developer Edition — free for dev/test) ──────────────
  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: local-mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -b -Q "SELECT 1" -o /dev/null || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Azure Service Bus Emulator (internal SQL Server dependency) ───────────────
  servicebus-sql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: local-servicebus-sql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      SA_PASSWORD: "${SERVICEBUS_SQL_PASSWORD}"
    volumes:
      - servicebus_sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -b -Q "SELECT 1" -o /dev/null || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Azure Service Bus Emulator ────────────────────────────────────────────────
  servicebus:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: local-servicebus
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: servicebus-sql
      MSSQL_SA_PASSWORD: "${SERVICEBUS_SQL_PASSWORD}"
    ports:
      - "${SERVICEBUS_PORT:-5672}:5672"
      - 5300:5300
    volumes:
      - ./servicebus/Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    depends_on:
      servicebus-sql:
        condition: service_healthy

volumes:
  mssql_data:
  postgres_data:
  servicebus_sql_data:
